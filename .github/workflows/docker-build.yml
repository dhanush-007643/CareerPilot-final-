name: Docker Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Backend Image
      run: docker build -t dhaanush19/careerpilot-backend:${{ github.sha }} ./backend

    - name: Build Frontend Image
      run: docker build -t dhaanush19/careerpilot-frontend:${{ github.sha }} ./frontend

    # Uncomment the steps below to automatically push to Docker Hub
