# ═══════════════════════════════════════════════════════════════════════════
# CareerPilot — Docker Build & Push
# ═══════════════════════════════════════════════════════════════════════════
# Builds Docker images on every push/PR to main.
# Pushes to Docker Hub when secrets are configured.
#
# Required GitHub Secrets (for push):
#   DOCKER_USERNAME  — Docker Hub username
#   DOCKER_PASSWORD  — Docker Hub access token
# ═══════════════════════════════════════════════════════════════════════════

name: Docker Build & Push

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t dhaanush19/careerpilot-backend:${{ github.sha }} ./backend

      - name: Build Frontend Image
        run: docker build -t dhaanush19/careerpilot-frontend:${{ github.sha }} ./frontend

      # Push to Docker Hub (only on push to main, not on PRs)
      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        continue-on-error: true

      - name: Push Backend Image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag dhaanush19/careerpilot-backend:${{ github.sha }} dhaanush19/careerpilot-backend:latest
          docker push dhaanush19/careerpilot-backend:${{ github.sha }}
          docker push dhaanush19/careerpilot-backend:latest
        continue-on-error: true

      - name: Push Frontend Image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag dhaanush19/careerpilot-frontend:${{ github.sha }} dhaanush19/careerpilot-frontend:latest
          docker push dhaanush19/careerpilot-frontend:${{ github.sha }}
          docker push dhaanush19/careerpilot-frontend:latest
        continue-on-error: true
