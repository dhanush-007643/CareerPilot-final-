# ═══════════════════════════════════════════════════════════════════════════
# CareerPilot — Automatic Deployment Pipeline
# ═══════════════════════════════════════════════════════════════════════════
# Triggers on push to main branch:
#   1. Deploy backend to Render (via deploy hook)
#   2. Deploy frontend to Vercel (via Vercel CLI)
#
# Required GitHub Secrets:
#   RENDER_DEPLOY_HOOK  — Render deploy hook URL (Settings → Deploy Hook)
#   VERCEL_TOKEN        — Vercel personal access token
#   VERCEL_ORG_ID       — From .vercel/project.json
#   VERCEL_PROJECT_ID   — From .vercel/project.json
# ═══════════════════════════════════════════════════════════════════════════

name: Deploy CareerPilot

on:
  push:
    branches: ["main"]

# Prevent concurrent deploys
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Deploy Backend to Render ─────────────────────────────────────────────
  deploy-backend:
    name: 🚀 Deploy Backend (Render)
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          echo "🔄 Triggering Render deploy..."
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "✅ Render deploy triggered!"
        # If RENDER_DEPLOY_HOOK is not set, this step will silently fail
        continue-on-error: true

  # ── Deploy Frontend to Vercel ────────────────────────────────────────────
  deploy-frontend:
    name: 🌐 Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
