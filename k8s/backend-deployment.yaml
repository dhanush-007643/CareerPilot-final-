# ═══════════════════════════════════════════════════════════════════════════
# CareerPilot — Backend Deployment + Service
# ═══════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cp-backend
  namespace: careerpilot
  labels:
    app: cp-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cp-backend
  template:
    metadata:
      labels:
        app: cp-backend
    spec:
      containers:
        - name: cp-backend
          image: dhaanush19/careerpilot-backend:latest
          ports:
            - containerPort: 5000
          # Non-sensitive config from ConfigMap
          envFrom:
            - configMapRef:
                name: cp-config
          # Sensitive credentials from Secret
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: cp-secrets
                  key: MONGO_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cp-secrets
                  key: JWT_SECRET
            - name: EMAIL_USER
              valueFrom:
                secretKeyRef:
                  name: cp-secrets
                  key: EMAIL_USER
            - name: EMAIL_PASS
              valueFrom:
                secretKeyRef:
                  name: cp-secrets
                  key: EMAIL_PASS
            - name: CLOUDINARY_NAME
              valueFrom:
                secretKeyRef:
                  name: cp-secrets
                  key: CLOUDINARY_NAME
            - name: CLOUDINARY_KEY
              valueFrom:
                secretKeyRef:
                  name: cp-secrets
                  key: CLOUDINARY_KEY
            - name: CLOUDINARY_SECRET
              valueFrom:
                secretKeyRef:
                  name: cp-secrets
                  key: CLOUDINARY_SECRET
          # Resource limits
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # Health probes
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: cp-backend
  namespace: careerpilot
  labels:
    app: cp-backend
spec:
  selector:
    app: cp-backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
