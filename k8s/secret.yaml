# ═══════════════════════════════════════════════════════════════════════════
# CareerPilot — Secret (Sensitive Credentials)
# ═══════════════════════════════════════════════════════════════════════════
# IMPORTANT: Replace the base64 placeholders below with your real values.
#   Encode:   echo -n "your_value" | base64
#   Decode:   echo "base64_string" | base64 -d
# ═══════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: cp-secrets
  namespace: careerpilot
  labels:
    app: careerpilot
type: Opaque
data:
  # echo -n "mongodb+srv://user:pass@cluster.mongodb.net/careerpilot" | base64
  MONGO_URI: REPLACE_WITH_BASE64_ENCODED_MONGO_URI

  # echo -n "your_jwt_secret_here" | base64
  JWT_SECRET: REPLACE_WITH_BASE64_ENCODED_JWT_SECRET

  # echo -n "your_email@gmail.com" | base64
  EMAIL_USER: REPLACE_WITH_BASE64_ENCODED_EMAIL

  # echo -n "your_app_password" | base64
  EMAIL_PASS: REPLACE_WITH_BASE64_ENCODED_EMAIL_PASS

  # echo -n "your_cloud_name" | base64
  CLOUDINARY_NAME: REPLACE_WITH_BASE64_ENCODED_VALUE

  # echo -n "your_api_key" | base64
  CLOUDINARY_KEY: REPLACE_WITH_BASE64_ENCODED_VALUE

  # echo -n "your_api_secret" | base64
  CLOUDINARY_SECRET: REPLACE_WITH_BASE64_ENCODED_VALUE
