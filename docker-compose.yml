version: '3.8'

services:
  # ── MongoDB ──────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:latest
    container_name: cp-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - cp-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Backend (Node.js + Express) ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cp-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/careerpilot
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - cp-network

  # ── Frontend (React + Nginx) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
        VITE_SOCKET_URL: http://localhost:5000
    container_name: cp-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - cp-network

volumes:
  mongo-data:

networks:
  cp-network:
    driver: bridge
