version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: cp-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cp-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/careerpilot
      # Add other necessary env vars here, like JWT_SECRET, etc.
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cp-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo-data:
